<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebView Test Suite</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>WebView Environment Inspector</h1>
        <div id="env-report" class="card">
            <p><strong>User Agent:</strong> <span id="ua-string">Loading...</span></p>
            <p><strong>Platform:</strong> <span id="platform">...</span></p>
            <p><strong>Cookies Enabled:</strong> <span id="cookies">...</span></p>
        </div>
    </header>

    <main>
        <h2>Available Tests</h2>
        <ul class="test-list">
            <li><a href="tests/window-open/index.html">New Window (_blank) Tester</a></li>
        </ul>
    </main>

    <script src="scripts/utils.js"></script>
    <script>
        document.getElementById('ua-string').textContent = navigator.userAgent;
        document.getElementById('platform').textContent = navigator.platform;
        document.getElementById('cookies').textContent = navigator.cookieEnabled;
    </script>
</body>

</html>
