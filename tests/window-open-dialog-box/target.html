<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Window</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #f4f4f9; }
        .btn-close { padding: 10px 20px; background: #ff3b30; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px;}
    </style>
</head>
<body>
    <h2>Window Spawned Successfully!</h2>
    <p>Triggered via: <strong id="launch-method">Unknown</strong></p>
    <p>An alert dialog should have popped up instantly.</p>
    
    <button class="btn-close" onclick="window.close()">Close Window</button>

    <script>
        // Parse URL query parameter to determine the path taken
        const urlParams = new URLSearchParams(window.location.search);
        const method = urlParams.get('method') || 'unknown';
        
        document.getElementById('launch-method').textContent = method.toUpperCase();

        // Trigger the dialog automatically once the DOM finishes mounting
        setTimeout(() => {
            alert(`Success! This alert was fired from a valid window instance opened via: ${method.toUpperCase()}`);
        }, 300);
    </script>
</body>
</html>
